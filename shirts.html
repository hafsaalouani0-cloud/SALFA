<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirts - SALFA Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="mobile_view">
                <button id="menuBtn" class="sandwich-button" aria-label="Ouvrir le menu"><ul><img src="images/menu-burger.png" class="menu-icon"></ul></button>
            </div>
            <div>
                <img src="images/salfa_logo.png" alt="Logo" class="logo2">
            </div>
            <div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="pants.html">Pants</a></li>
                    <li><a href="skirts.html">Skirts</a></li>
                    <li><a href="dresses.html">Dresses</a></li>
                    <li><a href="shirts.html" class="active">Shirts</a></li>
                </ul>
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
        </nav>
    </header>

    <section class="products">
        <h2 class="section-title">Shirts Collection</h2>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-title">
                <h2>Mon Panier</h2>
                <button class="close-cart" onclick="toggleCart()">✕</button>
            </div>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">Total: 0DH</div>
            <button class="checkout-btn" onclick="checkout()">Passer la commande</button>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="https://www.instagram.com/salfa_style26?igsh=MXJuZnM0MmxhdzQ1aA==">📸 Instagram</a>
            </div>
            <div class="vendeuses">
                <p>Vendeuses: Salma Ejgannour, Hafsa ALOUNI & Salma Essakhi</p>
                <p>&copy; 2024 SALFA Style. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        window.currentProducts = [
            {id:1, name:"T-Shirt Imprimé", price:179, img:"images/shirt2.jpeg"},
            {id:2, name:"Chemise Bleue", price:299, img:"images/shirt1.jpeg"},
            {id:3, name:"Chemise Verte", price:249, img:"images/shirt3.png"},
            {id:4, name:"top gris ", price:199, img:"images/shirt4.png"}
        ];
    </script>
</body>
</html>

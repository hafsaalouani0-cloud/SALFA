<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALFA Style - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="mobile_view">
                <button class="sandwich-button" aria-label="Ouvrir le menu"><ul>Menu</ul></button>
            </div>
            <div>
                <img src="images/salfa_logo.png" alt="Logo" class="logo2">
            </div>
            <div>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="pants.html">Pants</a></li>
                    <li><a href="skirts.html">Skirts</a></li>
                    <li><a href="dresses.html">Dresses</a></li>
                    <li><a href="shirts.html">Shirts</a></li>
                </ul>
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="slider">
            <div class="slide" style="background-image: url('images/jrb1.jpeg');">
            </div>
            <div class="slide" style="background-image: url('images/JRB5.jpeg');">
            </div>
            <div class="slide" style="background-image: url('images/jrb3.jpeg');">
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-title">
                <h2>Mon Panier</h2>
                <button class="close-cart" onclick="toggleCart()">✕</button>
            </div>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">Total: 0€</div>
            <button class="checkout-btn" onclick="checkout()">Passer la commande</button>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="https://www.instagram.com/salfa_style26?igsh=MXJuZnM0MmxhdzQ1aA==">📸 Instagram</a>
            </div>
            <div class="vendeuses">
                <p>Vendeuses: Salma Ejgannour, Hafsa ALOUNI & Salma Essakhi</p>
                <p>&copy; 2026 SALFA Style. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
